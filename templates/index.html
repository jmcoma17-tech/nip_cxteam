<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DLA Physics App</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Segoe UI",Arial,sans-serif;
    background:linear-gradient(135deg,#eef2ff,#f8fafc);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:100%;
    max-width:900px;
    background:white;
    border-radius:20px;
    padding:40px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.12);
}

h1{
    font-size:2.3rem;
    color:#1f2937;
    margin-bottom:10px;
}

p{
    color:#6b7280;
    margin-bottom:30px;
}

.controls{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:25px;
}

.control{
    display:flex;
    flex-direction:column;
    text-align:left;
}

label{
    margin-bottom:8px;
    font-weight:600;
    color:#374151;
}

input{
    width:220px;
    padding:12px;
    font-size:16px;
    border:1px solid #d1d5db;
    border-radius:8px;
    outline:none;
}

input:focus{
    border-color:#2563eb;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    padding:14px 34px;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 8px 20px rgba(37,99,235,.25);
}

button:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

.image-container{
    margin-top:35px;
    padding:15px;
    background:#f8fafc;
    border:1px solid #e5e7eb;
    border-radius:15px;
}

img{
    width:100%;
    max-width:700px;
    display:block;
    margin:auto;
    border-radius:10px;
}

@media(max-width:768px){

.controls{
    flex-direction:column;
    align-items:center;
}

input{
    width:100%;
    max-width:300px;
}

button{
    width:100%;
    max-width:300px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>Diffusion Limited Aggregation</h1>

<p>Generate a DLA fractal by choosing the grid size and number of particles.</p>

<div class="controls">

<div class="control">
<label>Grid Size</label>
<input
type="number"
id="grid"
value="601"
min="101"
step="2">
</div>

<div class="control">
<label>Particles</label>
<input
type="number"
id="particles"
value="3600"
min="1">
</div>

</div>

<button onclick="generate()">Generate DLA</button>

<div class="image-container">

<img id="image"
src=""
alt="Generated image will appear here">

</div>

</div>

<script>

function generate(){

    const grid=document.getElementById("grid").value;

    const particles=document.getElementById("particles").value;

    const image=document.getElementById("image");

    image.src=`/generate?grid=${grid}&particles=${particles}&t=${Date.now()}`;

}

</script>

</body>
</html>
